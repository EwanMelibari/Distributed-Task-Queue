spring.application.name=DTQ

server.port=8080

# Redis Server Connection
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Redis Pool Settings 
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# Custom Queue Names
queue.name.pending=pending_tasks
queue.name.processing=processing_tasks
queue.name.dead-letter=dead_letter_queue

# Retry Configuration
queue.retry.max-attempts=3
queue.retry.backoff-ms=5000

# Logging level for debugging Redis operations
logging.level.org.springframework.data.redis=INFO
logging.level.com.example.queue=DEBUG

# Jackson Properties
spring.jackson.serialization.write-dates-as-timestamps=false

